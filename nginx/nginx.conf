events {}

http {
  # Dev-time proxy. Not a production config — no TLS, no buffering tuning,
  # no rate limiting. Its only job is to route / → react:5173 (Vite dev
  # server) and /api, /health → flask:5000 so the browser sees everything
  # on one origin. Same-origin simplifies CORS off the table for the demo.
  #
  # Vite dev uses websockets for HMR; `proxy_http_version 1.1` plus the
  # Upgrade/Connection headers keep HMR working through the proxy.

  server {
    listen 80;

    location /api/ {
      proxy_pass http://flask:5000;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://react:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
