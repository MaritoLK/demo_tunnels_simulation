events {}

http {
  # Dev-time proxy. Not a production config — no TLS, no buffering tuning,
  # no rate limiting. Its only job is to route / → react:5173 (Vite dev
  # server) and /api, /health → flask:5000 so the browser sees everything
  # on one origin. Same-origin simplifies CORS off the table for the demo.
  #
  # Vite dev uses websockets for HMR; `proxy_http_version 1.1` plus the
  # Upgrade/Connection headers keep HMR working through the proxy.

  # §9.27d micro-cache. The polling frontend hits /api/v1/world/state every
  # 500ms. Without caching, N simultaneous viewers = N DB round-trips per
  # poll. With a 1s TTL, all viewers during each second-window share one
  # upstream request — DB sees ~1 req/s/sim regardless of viewer count.
  # nginx's proxy_cache_valid requires integer seconds, so 1s is the floor;
  # paired with a 1s TTL on the daemon's default speed=1 means UI sees one
  # slightly-stale tick at worst, and at higher speeds it's pure throughput.
  proxy_cache_path /var/cache/nginx/world_state
                   levels=1:2 keys_zone=world_state:1m
                   max_size=10m inactive=1m use_temp_path=off;

  server {
    listen 80;

    # Security headers — cheap wins regardless of dev/prod.
    # X-Content-Type-Options: MIME-sniff protection.
    # X-Frame-Options: click-jacking protection; DENY since we don't
    #   need to embed the app in any frame.
    # Referrer-Policy: avoid leaking paths to any linked resource.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Reject oversized request bodies at the proxy so a malformed PUT
    # /simulation can't allocate megabytes in Flask before the
    # route-layer validator 400s it. The largest legitimate body is the
    # PUT /simulation payload — a handful of ints — so 16k is plenty.
    client_max_body_size 16k;

    # Cache only the composite polling endpoint. Everything else in
    # /api/ is either mutation (PUT/POST/PATCH — nginx won't cache
    # anyway) or low-frequency read; caching them would risk stale
    # UI after mutations.
    location = /api/v1/world/state {
      proxy_pass http://flask:5000;
      proxy_set_header Host $host;

      proxy_cache world_state;
      # Include the query string in the cache key so ?since_tick=N
      # doesn't collide with ?since_tick=M.
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_valid 200 1s;
      # Lock: when the cache is cold, only the first request fetches
      # from upstream; siblings wait for the fill. Prevents a thundering
      # herd of N viewers all missing the cache at once.
      proxy_cache_lock on;
      proxy_cache_lock_timeout 500ms;
      # Surface the cache status so `curl -I` during debugging shows
      # HIT/MISS/EXPIRED — easier to verify the cache is actually working.
      add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/ {
      proxy_pass http://flask:5000;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://react:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
