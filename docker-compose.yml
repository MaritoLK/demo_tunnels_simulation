services:

  flask:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://tunnels:${DB_PASSWORD:-tunnels_dev}@db:5432/tunnels
      FLASK_ENV: development
      # FLASK_DEBUG enables the reloader + debugger. FLASK_ENV alone is
      # deprecated (Flask ≥2.2) and does NOT turn on the reloader — we
      # hit this live during demo prep when .py edits didn't propagate.
      FLASK_DEBUG: 1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    # Auto-restart on crash so a single unhandled exception during the
    # live demo doesn't end the session. `unless-stopped` (not `always`)
    # respects a deliberate `docker compose stop` between runs.
    restart: unless-stopped
  react:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:          
    image: nginx:alpine                                                                                                                            
    ports:                                                                                                                                         
      - "80:80"
    volumes:                                                                                                                                       
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - flask
      - react
  
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: tunnels
      POSTGRES_USER: tunnels
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tunnels_dev}  
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:                                                                                                                                     
      test: ["CMD-SHELL", "pg_isready -U tunnels"]                                                                                                   
      interval: 5s                                
      timeout: 3s 
      retries: 5

volumes:                                              
  pgdata:
  